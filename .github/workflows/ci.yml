name: CI

# Fully offline: engine is pure Python, extraction/narration use the deterministic
# mock, so tests + calibration run green with zero API keys.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (test-only deps — no litellm; tests are fully offline)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run tests
        run: pytest -q
      - name: Calibration smoke run — both domains (offline)
        run: |
          python scripts/run_calibration.py --domain software
          python scripts/run_calibration.py --domain marketing
